<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <!-- Import SockJS and STOMP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h2>Candidate Status Monitor</h2>
    <div id="messages" style="padding: 20px; background: #eee; font-family: monospace;">Waiting for updates...</div>

    <script>
        // 1. Connect to your Spring Boot backend
        var socket = new SockJS('http://localhost:8080/ws');
        var stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            
            // 2. Subscribe to candidate ID 5 (Change this ID if you are testing a different user)
            stompClient.subscribe('/topic/updates/8', function (message) {
                var payload = JSON.parse(message.body);
                var div = document.getElementById('messages');
                div.innerHTML += "<br/>✅ UPDATE RECEIVED: " + payload.status;
                div.style.background = "#d4edda"; // Turn green on update!
            });
        });
    </script>
</body>
</html>
